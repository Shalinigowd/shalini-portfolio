<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #0f172a;
  color: #e2e8f0;
}

/* HEADER */
header {
  background: #1e293b;
  color: #f8fafc;
  padding: 50px 20px;
  text-align: center;
}

header h1 {
  font-size: 32px;
  margin: 0;
}

header p {
  margin-top: 10px;
  font-size: 18px;
  color: #cbd5f5;
}

/* SECTION */
section {
  padding: 40px 20px;
  max-width: 1000px;
  margin: auto;
}

h2 {
  border-left: 5px solid #22c55e;
  padding-left: 10px;
  color: #f1f5f9;
}

/* PROJECT GRID */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.project {
  background: #1e293b;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.project:hover {
  transform: translateY(-5px);
}

.project img {
  width: 100%;
  border-radius: 8px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 14px;
  background: #22c55e;
  color: #022c22;
  text-decoration: none;
  border-radius: 6px;
  font-weight: 500;
}

.btn:hover {
  background: #16a34a;
}

/* SKILLS */
.skills span {
  display: inline-block;
  background: #22c55e;
  color: #022c22;
  padding: 6px 10px;
  margin: 5px;
  border-radius: 5px;
  font-size: 14px;
}

/* CONTACT LINKS */
a {
  color: #38bdf8;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #020617;
  color: #94a3b8;
}

/* ANIMATION */
.fade {
  animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
